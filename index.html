<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sremeas's simple form of leave of absence letter.">
    <title>Absence Form Generator</title>
    
    <style>
        /* =========================================
           INLINED style.css
           ========================================= */
        body { font: 20px Helvetica, Arial; margin: 0; padding: 0; overflow-x: hidden; background: #f8f9fa; }
        input:focus::placeholder { color: transparent; }
        .preferably-square { width: 100%; aspect-ratio: auto 1 / 1; }
        ::placeholder { color: #000000; opacity: 1; }
        :-ms-input-placeholder { color: #000000; }
        
        @font-face {
            font-family: 'Krasar';
            src: url("Krasar.woff") format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }
        
        label { font-family: 'Krasar'; font-size: 18px; }
        h4 { color: #0D55B5; }
        .card { background: #fff; }
        .back { margin-left: 2%; }
        form { width: 40%; }
        .container { width: 30%; float: left; margin-top: 1em; color: #000; text-align: center; display: none; margin-left: 2%; }
        select { border:1px solid #a7a7a7; height:40px; padding: 5px; }
        input { padding: 9px; }
        .styled-select select { -moz-appearance:none; -webkit-appearance:none; appearance:none; }
        input, select { color:#000; background-color: #ffffff; display: table; margin-bottom: 1em; width: 100%; font-size: 16px; border: 1px solid #a7a7a7; border-radius: 5px; font-family: 'Krasar'; height:40px; box-sizing: border-box; }
        #file { opacity: 0; width: 0.1px; height: 0.1px; position: absolute; }
        .upload, button { color: #fff; background: #0D55B5; padding: 10px; border: 2px solid #0D55B5; border-radius: 5px; cursor: pointer; }
        form span { font-size: 12px; }
        #preview { font-size: 16px; margin-top: 0em; }
        #result { position: relative; height: 95%; border-radius: 1000px; box-shadow: 0 0 0 1px #0d55b5; background-color: #fff; width: 95%; aspect-ratio: auto 1 / 1; }
        header { width: 100%; background: #159; border-radius: 12px 12px 0 0 ; }
        header::after { content: ""; display: flex; clear: both; }
        .camp { width: 40%; float: left; color: #fff; }
        .camp h4 { margin: 12px auto 0 7px; }
        .camp span { margin-left: 8px; }
        #logo { width: 150px; height: 80px; float: right; }
        .content { width: 80%; }
        .content::after { content: ""; display: flex; clear: both; }
        .content img { float: left; width: 80px; height: 105px; margin-left: 7px; margin-top: 12px; }
        .content ul { width: 50%; float: left; padding-left: 15px; }
        ul li { list-style-type: none; }
        #down { font-size: 18px; }
        
        @media only screen and (max-width:768px) {
            .container, form { width: 90%; margin-left: 5%; }
            .back { margin-left: 0%; }
            #down { margin-right: 2em; margin-bottom: 2em; }
            #preview { font-size: 16px; margin-top: 0em; margin-left: 5%; }
        }

        /* =========================================
           MENU STYLES (For Single Page App)
           ========================================= */
        .menu-container { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .menu-btn { font-size: 20px; padding: 15px 30px; margin: 10px; width: 250px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-leave { background-color: #0D55B5; }
        .btn-dayoff { background-color: #28a745; }
        .back-button { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; font-size: 16px; background-color: #bababa; color: rgb(0, 0, 0); border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease; z-index: 100; }
        .back-button:hover { background-color: #0056b3; color: white; }
    </style>
</head>
<body>

    <div id="mainMenu" class="menu-container">
        <h2 style="font-family: 'Krasar', sans-serif;">Absence Form Generator</h2>
        <button class="menu-btn btn-leave" onclick="selectForm('leave')">Leave Request</button>
        <button class="menu-btn btn-dayoff" onclick="selectForm('dayoff')">Day Off Request</button>
    </div>

    <div id="appInterface" style="display: none;">
        
        <div class="back" id="form">
            <form onsubmit="handleForm(event)" id="absenceForm" method="POST">
                <h4 id="formTitle"><center>Leave of Absence Letter</center></h4>
                
                <input name="entry.384490164" type="text" id="inName" lang="km" placeholder="ឈ្មោះ">
                
                <select style="width: 39%; float: left; margin-right: 2%;" id="inSex">
                    <option value="" selected disabled hidden>ភេទ</option>
                    <option value="2">ប្រុស</option>
                    <option value="4">ស្រី</option>
                </select>
                
                <input style="width: 59%;" lang="km" type="text" id="inPosition" placeholder="តួនាទី" >
                
                <label style="width: 39%; float: left; margin-right: 2%;" for="inDays">ចំនួនថ្ងៃឈប់</label>            
                <select name="entry.1197682587" style="width: 59%" lang="km" id="inDays">
                    <option value="" selected disabled hidden>ជ្រើសរើស / Select</option>
                    <option value="0.5">0.5</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="90">90</option>
                </select>

                <label style="width: 39%; float: left; margin-right: 2%;" for="inDateF">ចាប់ពីថ្ងៃទី</label>
                <input name="entry.173238631" style="width: 59%" type="date" id="inDateF">
              
                <label style="width: 39%; float: left; margin-right: 2%;" for="inDateT">ដល់ថ្ងៃទី</label>
                <input name="entry.497671739" style="width: 59%" type="date" id="inDateT">
              
                <label style="width: 39%; float: left; margin-right: 2%;" for="inDateI">ចូលធ្វើការវិញថ្ងៃទី</label>
                <input name="entry.877231613" style="width: 59%" type="date" id="inDateI">

                <input name="entry.2040428057" type="text" lang="km" id="inReason" placeholder="មូលហេតុ...">
                
                <button style="width: 100%; margin: auto;" type="submit" id="previewBtn"><b>Preview</b></button>
            </form>

            <div hidden> 
                <span id="KHinDateF"></span>
                <span id="KHinDateT"></span>
                <span id="KHinDateI"></span>
                <span id="KHinDays"></span>
                <img src="./Sremeas-Logo.webp" id="logo" onerror="this.onerror=null; this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
            </div>
        </div>
        
        <div class="container" id="show">
            <div class="preferably-square">
                <canvas id="result" width="720px" height="760px"></canvas>
            </div>
            <button style="font-size: 16px; margin-right: auto; margin-left: auto;" id="down"><b>Download</b></button>&nbsp;
            <button style="font-size: 16px; margin-right: auto; margin-left: auto;" id="shareBtn"><b>Share Image</b></button>
        </div>
        
        <button class="back-button" onclick="goHome()">Home Menu</button>
    </div>

    <script>
        let currentMode = 'leave';

        // 1. View Switching logic
        function selectForm(mode) {
            currentMode = mode;
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('appInterface').style.display = 'block';
            document.getElementById('form').style.display = 'block';
            document.getElementById('show').style.display = 'none';
            
            const form = document.getElementById('absenceForm');
            const title = document.getElementById('formTitle');
            const reasonInput = document.getElementById('inReason');
            
            // Reset fields
            form.reset();
            ['KHinDateF', 'KHinDateT', 'KHinDateI', 'KHinDays'].forEach(id => {
                document.getElementById(id).textContent = '';
            });

            // Set Form Actions & Details based on selection
            if (mode === 'dayoff') {
                title.innerHTML = '<center>Day Off Letter</center>';
                form.action = 'https://docs.google.com/forms/d/e/xxx/formResponse';
                reasonInput.value = 'Day Off';
                reasonInput.disabled = true;
            } else {
                title.innerHTML = '<center>Leave of Absence Letter</center>';
                form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSevkTqDT9Fv8-bZbUSTvxbJqR5RB_siYvk2PIZFBbN5GJeEZw/formResponse';
                reasonInput.value = '';
                reasonInput.disabled = false;
            }
        }

        function goHome() {
            document.getElementById('appInterface').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
        }

        // 2. Khmer Date Conversion
        const khmerMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
        
        ['inDateF', 'inDateT', 'inDateI'].forEach(id => {
            document.getElementById(id).addEventListener('change', function () {
                const date = new Date(this.value);
                if (!isNaN(date)) {
                    const day = date.getDate().toString().replace(/\d/g, d => String.fromCharCode(6112 + parseInt(d))); 
                    const month = khmerMonths[date.getMonth()];
                    const year = date.getFullYear().toString().replace(/\d/g, d => String.fromCharCode(6112 + parseInt(d)));
                    document.getElementById('KH' + id).textContent = `${day}.${month}.${year}`;
                } else {
                    document.getElementById('KH' + id).textContent = "";
                }
            });
        });

        function convertToKhmer() {
            const khmerNumbers = ['០', '១', '២', '៣', '៤', '៥', '៦', '៧', '៨', '៩'];
            let inputValue = document.getElementById('inDays').value;
            if (!inputValue) return;
            
            let integerPart = Math.floor(inputValue);
            let decimalPart = inputValue.split('.')[1] || '';
            let khmerValue = '';

            for (let i = 0; i < integerPart.toString().length; i++) {
                khmerValue += khmerNumbers[parseInt(integerPart.toString()[i])];
            }

            if (decimalPart) {
                khmerValue += '.';
                for (let i = 0; i < decimalPart.length; i++) {
                    khmerValue += khmerNumbers[parseInt(decimalPart[i])];
                }
            }
            document.getElementById('KHinDays').innerText = khmerValue;
        }

        // 3. Form Submit and Canvas Drawing
        async function handleForm(event) {
            event.preventDefault();

            // Validate Form
            const fields = {
                inName: "ឈ្មោះ",
                inSex: "ភេទ",
                inPosition: "តួនាទី",
                inDays: "ចំនួនថ្ងៃឈប់",
                inDateF: "ថ្ងៃចាប់ផ្តើម",
                inDateT: "ថ្ងៃបញ្ចប់",
                inDateI: "ថ្ងៃចូល​ធ្វើការវិញ",
                inReason: "មូលហេតុ"            
            };
        
            for (const [id, name] of Object.entries(fields)) {
                const element = document.getElementById(id);
                if (element && element.value.length === 0 && !element.disabled) {
                    alert(`សូម​បញ្ចូល "${name}" !`);
                    return; 
                }
            }

            convertToKhmer();

            // Submit background fetch to Google Form
            const formData = new FormData(event.target);
            if(currentMode === 'dayoff') formData.set('entry.2040428057', 'Day Off');

            try {
                fetch(event.target.action, { method: event.target.method, body: formData });
            } catch (error) {
                console.error("Network error:", error);
            }

            // Canvas Setup
            document.getElementById("form").style.display = "none";
            document.getElementById("show").style.display = "block";

            const canvas = document.getElementById("result");
            const ctx = canvas.getContext("2d");
            const logo = document.getElementById("logo");

            let inName = document.getElementById("inName").value;
            let inSex = document.getElementById("inSex").value;
            let inPosition = document.getElementById("inPosition").value;
            let inDays = document.getElementById("KHinDays").textContent + " ថ្ងៃ";
            let inDateF = document.getElementById("KHinDateF").textContent;
            let inDateT = document.getElementById("KHinDateT").textContent;
            let inDateI = document.getElementById("KHinDateI").textContent;
            let inReason = document.getElementById("inReason").value;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 800, 900);
            
            // Switch Banner Color based on Mode (Blue for leave, Green for Day off)
            ctx.fillStyle = (currentMode === 'dayoff') ? "#28a745" : "#0D55B5"; 
            ctx.fillRect(0, 0, 800, 100);
            
            ctx.fillStyle = "#0D55B5";
            ctx.fillRect(200, 570, 300, 2);
            try { ctx.drawImage(logo, 25, 15, 140, 70); } catch(e){}
            
            ctx.fillStyle = "#000";
            ctx.font = '22pt Krasar'; 
            ctx.fillStyle = "#ffffff";
            ctx.fillText("ពាក្យស្នើសុំអនុញ្ញាតឈប់សម្រាក", 200, 68);
            
            ctx.font = '20pt Krasar'; 
            ctx.fillStyle = "#000";
            ctx.fillText("ខ្ញុំបាទ/នាងខ្ញុំ", 50, 150);
            ctx.fillStyle = "#0D55B5";
            ctx.textAlign = "center";
            ctx.fillText(inName, 280, 150);
            ctx.fillStyle = "#000";
            ctx.textAlign = "start";
            ctx.fillText("តួនាទី", 380, 150);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inPosition, 450, 150);
            ctx.fillStyle = "#000";
            ctx.fillText("សូមគោរពជូនលោកប្រធានហាងស្រែមាស", 150, 210);
            ctx.fillText("កម្មវត្ថុ", 50, 270);
            ctx.fillText("សុំច្បាប់ឈប់សម្រាកចំនួន", 200, 270);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inDays, 470, 270);
            ctx.fillStyle = "#000";
            ctx.fillText("ចាប់ពីថ្ងៃទី", 50, 340);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inDateF, 250, 340);
            ctx.fillStyle = "#000";
            ctx.fillText("ដល់ថ្ងៃទី", 50, 410);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inDateT, 250, 410);
            ctx.fillStyle = "#000";
            ctx.fillText("ចូលធ្វើការវិញថ្ងៃទី", 50, 480);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inDateI, 250, 480);
            ctx.fillStyle = "#000";
            ctx.fillText("មូលហេតុ", 50, 550);
            ctx.fillStyle = "#0D55B5";
            ctx.fillText(inReason, 250, 550);
            ctx.fillStyle = "#000";
            ctx.fillText("សេចក្តីដូចបានជម្រាបខាងលើ", 200, 620);
            ctx.fillText("សូមលោកប្រធានមេត្តាអនុញ្ញាតដោយក្តីអនុគ្រោះ", 100, 670);
            ctx.fillText("សូមលោកប្រធានទទួលការគោរពដ៏ខ្ពង់ខ្ពស់អំពីខ្ញុំបាទ/នាងខ្ញុំ។", 50, 720); 
            
            if (inSex == "2") {      
                ctx.fillRect(122, 142, 60, 2);
                ctx.fillRect(582, 712, 60, 2);
            } else {       
                ctx.fillRect(50, 142, 60, 2);
                ctx.fillRect(512, 712, 60, 2);
            }
        }

        // 4. Download and Share features
        document.getElementById("down").addEventListener("click", function(){
            const canvas = document.getElementById("result");
            if(window.navigator.msSaveBlob) {
                window.navigator.msSaveBlob(canvas.msToBlob(), "AbsenceCard.png");
            } else {
                const a = document.createElement("a");
                document.body.appendChild(a);
                a.href = canvas.toDataURL("image/png");
                a.download = "AbsenceCard.png";
                a.click();
                document.body.removeChild(a);
            }
        });

        document.getElementById("shareBtn").addEventListener("click", async function(){
            const canvas = document.getElementById("result");
            const dataUrl = canvas.toDataURL();
            const blob = await (await fetch(dataUrl)).blob(); 
            const filesArray = [new File([blob], 'AbsenceCard.png', { type: blob.type, lastModified: new Date().getTime() })]; 

            const inSex = document.getElementById("inSex").value;
            const inputName = document.getElementById("inName").value;
            const mF = (inSex == "2") ? "ខ្ញុំបាទ" : "នាង​ខ្ញុំ";
            const textShow = `សូមគោរព ជំរាបសួរលោកប្រធាន និងថ្នាក់ដឹកនាំ។ ${mF} ${inputName} សុំអនុញ្ញាតច្បាប់សម្រាកដូចទម្រង់ខាងលើដោយក្តីអនុគ្រោះ។`;

            try {
                await navigator.share({ text: textShow, files: filesArray });
            } catch (err) {
                console.log('Error sharing:', err);
            }
        });
    </script>
</body>
</html>
